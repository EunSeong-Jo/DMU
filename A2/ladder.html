<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>도트 저축 챌린지</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <div class="pixel-header">
    💰 목표 금액: <span id="goalAmount">0</span>원
  </div>

  <div class="pixel-stage">
    <div class="pixel-step step1"></div>
    <div class="pixel-step step2"></div>
    <div class="pixel-step step3"></div>
    <div class="pixel-character" id="character"></div>
  </div>

  <div class="pixel-box center-box">
    <button onclick="processSaving()">💾 저금 처리</button>
    <div class="result-text" id="statusText"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
